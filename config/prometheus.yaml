global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'kafka-broker-1'
    static_configs:
      - targets: ['jmx-exporter-1:9090']

  - job_name: 'kafka-broker-2'
    static_configs:
      - targets: ['jmx-exporter-2:9090']

  - job_name: 'kafka-broker-3'
    static_configs:
      - targets: ['jmx-exporter-3:9090']

  - job_name: 'zookeeper'
    static_configs:
      - targets: ['zookeeper:7070']
